<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ошибка | LitEnergy</title>
    <link rel="stylesheet" href="fonts/fonts.css" />
    <link rel="stylesheet" href="styles/google-fonts.css" />
    <style>
      :root {
        color-scheme: dark;
        --accent: #00e5da;
        --bg: #0c0c0c;
        --panel: #151515;
        --border: #11d9cf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(0, 229, 218, 0.08), transparent 32%),
          rgba(0, 0, 0, 0.62);
        font-family: "Exo 2", Arial, sans-serif;
      }

      .overlay {
        width: 100%;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.42);
      }

      .modal {
        position: relative;
        width: min(300px, 92vw);
        min-height: 260px;
        padding: 18px 16px 14px;
        border-radius: 10px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 45%),
          linear-gradient(180deg, #1b1b1b, #111111);
        border-top: 3px solid var(--border);
        border-bottom: 3px solid var(--border);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
      }

      .modal::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          url("placeholders/missing-asset.svg?path=modals%2Ferror%2Fbackground.png") center / cover no-repeat;
        opacity: 0.22;
        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .title {
        margin: 0;
        text-align: center;
        color: #fff;
        font-family: "Roboto Condensed", Arial, sans-serif;
        font-size: 46px;
        font-weight: 900;
        font-style: italic;
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      .plate {
        position: relative;
        margin: 2px auto 0;
        width: 100%;
        max-width: 268px;
        min-height: 82px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #111;
        font-family: "Roboto Condensed", Arial, sans-serif;
        font-size: 24px;
        font-weight: 900;
        font-style: italic;
        line-height: 0.9;
        text-transform: uppercase;
        text-align: left;
        letter-spacing: -0.03em;
      }

      .plate::before {
        content: "";
        position: absolute;
        inset: 0;
        background: #fff;
        clip-path: polygon(0 0, 100% 0, 86% 100%, 0 100%);
      }

      .plate span {
        position: relative;
        z-index: 1;
        display: inline-block;
        transform: translateX(-10px);
      }

      .plate .accent {
        color: var(--accent);
      }

      .button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        min-height: 56px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(180deg, #1cf0e5, #08d6cb);
        color: #fff;
        text-decoration: none;
        font-family: "Roboto Condensed", Arial, sans-serif;
        font-size: 24px;
        font-weight: 900;
        font-style: italic;
        box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.35), inset 0 -2px 6px rgba(0, 0, 0, 0.18);
      }

      .fire {
        font-size: 26px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="modal">
        <div class="content">
          <h1 class="title">ОШИБКА</h1>
          <div class="plate">
            <span>Что-то пошло не так...<br />Свяжитесь с <span class="accent">поддержкой</span></span>
          </div>
          <a class="button" href="external-link.html?url=https%3A%2F%2Ft.me%2Flithelps">
            <span>НАПИСАТЬ</span>
            <span class="fire">🔥</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
